name: MP Alertas — CI/CD

on:
  push:
    branches: [main, master]
    tags:     ['v*']
  pull_request:
    branches: [main, master]

env:
  APP_NAME:   mp-alertas
  AWS_REGION: us-east-1
  PYTHON_VER: "3.11"

# ── Permisos mínimos ─────────────────────────────────────────────────────────
permissions:
  contents: read
  id-token: write    # Para OIDC auth con AWS (sin access keys)

jobs:
# ══════════════════════════════════════════════════════════════════════════════
  test:
    name: "🧪 Tests (84 assertions)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          DATABASE_URL:               sqlite://
          TICKET_MERCADO_PUBLICO:     TEST_TICKET
          DASHBOARD_USER:             admin
          DASHBOARD_PASS:             testpass
          SECRET_KEY:                 test-secret
          SMTP_HOST:                  localhost
          SMTP_PORT:                  "1025"
          SMTP_USER:                  test@test.cl
          SMTP_PASSWORD:              pass
          SMTP_FROM:                  test@test.cl
          SMTP_USE_TLS:               "false"
          ADMIN_EMAIL:                admin@test.cl
          ALERT_DEDUP_DAYS:           "30"
          APP_BASE_URL:               http://localhost:5000
          API_RATE_PER_SECOND:        "100"
          API_RATE_PER_DAY:           "999999"
        run: |
          python test_mvp.py 2>&1 | tee test_output.txt
          # Verificar que no hubo fallos
          if grep -q "Failed: 0" test_output.txt; then
            echo "✅ 100% tests passed"
          else
            echo "❌ Tests fallaron"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt

# ══════════════════════════════════════════════════════════════════════════════
  lint:
    name: "🔍 Linting"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip
      - run: pip install flake8
      - name: Flake8 (errores críticos únicamente)
        run: |
          flake8 app/ main.py config.py \
            --max-line-length=120 \
            --select=E9,F63,F7,F82 \
            --exclude=__pycache__

# ══════════════════════════════════════════════════════════════════════════════
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sin push en PRs)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: ${{ env.APP_NAME }}:ci-test

# ══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: "🚀 Deploy → Staging"
    runs-on: ubuntu-latest
    needs:   [test, docker-build]
    if:      github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url:  ${{ steps.outputs.outputs.dashboard_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          target:  runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:staging-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy CloudFormation (staging)
        run: |
          # Crear params.staging.json desde secrets
          cat > deploy/aws/params.staging.json << EOF
          [
            {"ParameterKey": "AppName",              "ParameterValue": "mp-alertas-staging"},
            {"ParameterKey": "Environment",          "ParameterValue": "staging"},
            {"ParameterKey": "DockerImage",          "ParameterValue": "${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}"},
            {"ParameterKey": "VpcId",               "ParameterValue": "${{ secrets.VPC_ID_STAGING }}"},
            {"ParameterKey": "SubnetIds",            "ParameterValue": "${{ secrets.SUBNET_IDS_STAGING }}"},
            {"ParameterKey": "PrivateSubnetIds",     "ParameterValue": "${{ secrets.PRIVATE_SUBNET_IDS_STAGING }}"},
            {"ParameterKey": "DbPassword",           "ParameterValue": "${{ secrets.DB_PASSWORD_STAGING }}"},
            {"ParameterKey": "DashboardPass",        "ParameterValue": "${{ secrets.DASHBOARD_PASS_STAGING }}"},
            {"ParameterKey": "TicketMercadoPublico", "ParameterValue": "${{ secrets.TICKET_MP_STAGING }}"},
            {"ParameterKey": "SmtpPassword",         "ParameterValue": "${{ secrets.SMTP_PASSWORD }}"},
            {"ParameterKey": "SmtpHost",             "ParameterValue": "smtp.gmail.com"},
            {"ParameterKey": "SmtpUser",             "ParameterValue": "${{ secrets.SMTP_USER }}"},
            {"ParameterKey": "AdminEmail",           "ParameterValue": "${{ secrets.ADMIN_EMAIL }}"},
            {"ParameterKey": "CertificateArn",       "ParameterValue": ""},
            {"ParameterKey": "ContainerCpu",         "ParameterValue": "256"},
            {"ParameterKey": "ContainerMemory",      "ParameterValue": "512"}
          ]
          EOF
          ENVIRONMENT=staging bash deploy/aws/deploy.sh --stack-only

      - name: Get Dashboard URL
        id: outputs
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name mp-alertas-staging-stack \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardUrl'].OutputValue" \
            --output text)
          echo "dashboard_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        run: |
          URL="${{ steps.outputs.outputs.dashboard_url }}"
          echo "Testing $URL ..."
          sleep 30  # dar tiempo al ECS para estabilizarse
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "admin:${{ secrets.DASHBOARD_PASS_STAGING }}" "$URL/" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Smoke test OK (HTTP $STATUS)"
          else
            echo "❌ Smoke test falló (HTTP $STATUS)"
            exit 1
          fi

# ══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: "🚀 Deploy → Production"
    runs-on: ubuntu-latest
    needs:   [deploy-staging]
    if:      startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url:  ${{ steps.outputs.outputs.dashboard_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get version tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build & Push to ECR (production)
        uses: docker/build-push-action@v5
        with:
          context:   .
          target:    runtime
          platforms: linux/amd64
          push:      true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy CloudFormation (production)
        env:
          DOCKER_IMAGE: ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          cat > deploy/aws/params.production.json << EOF
          [
            {"ParameterKey": "AppName",              "ParameterValue": "mp-alertas"},
            {"ParameterKey": "Environment",          "ParameterValue": "production"},
            {"ParameterKey": "DockerImage",          "ParameterValue": "$DOCKER_IMAGE"},
            {"ParameterKey": "VpcId",               "ParameterValue": "${{ secrets.VPC_ID_PROD }}"},
            {"ParameterKey": "SubnetIds",            "ParameterValue": "${{ secrets.SUBNET_IDS_PROD }}"},
            {"ParameterKey": "PrivateSubnetIds",     "ParameterValue": "${{ secrets.PRIVATE_SUBNET_IDS_PROD }}"},
            {"ParameterKey": "CertificateArn",       "ParameterValue": "${{ secrets.ACM_CERT_ARN_PROD }}"},
            {"ParameterKey": "DbPassword",           "ParameterValue": "${{ secrets.DB_PASSWORD_PROD }}"},
            {"ParameterKey": "DashboardPass",        "ParameterValue": "${{ secrets.DASHBOARD_PASS_PROD }}"},
            {"ParameterKey": "TicketMercadoPublico", "ParameterValue": "${{ secrets.TICKET_MP_PROD }}"},
            {"ParameterKey": "SmtpPassword",         "ParameterValue": "${{ secrets.SMTP_PASSWORD }}"},
            {"ParameterKey": "SmtpHost",             "ParameterValue": "smtp.gmail.com"},
            {"ParameterKey": "SmtpUser",             "ParameterValue": "${{ secrets.SMTP_USER }}"},
            {"ParameterKey": "AdminEmail",           "ParameterValue": "${{ secrets.ADMIN_EMAIL }}"},
            {"ParameterKey": "ContainerCpu",         "ParameterValue": "512"},
            {"ParameterKey": "ContainerMemory",      "ParameterValue": "1024"}
          ]
          EOF
          ENVIRONMENT=production bash deploy/aws/deploy.sh --stack-only

      - name: Get Dashboard URL
        id: outputs
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name mp-alertas-stack \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardUrl'].OutputValue" \
            --output text)
          echo "dashboard_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## MP Alertas ${{ steps.tag.outputs.tag }}
            
            Dashboard: ${{ steps.outputs.outputs.dashboard_url }}
            Imagen Docker: `${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}`
