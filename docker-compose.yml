version: "3.9"

# ── MP Alertas — docker-compose.yml ──────────────────────────────────────────
# Uso rápido:
#   docker compose up -d                # levanta solo el servicio principal (SQLite)
#   docker compose --profile postgres up -d  # usa PostgreSQL
#
# Copiar .env.example → .env y completar las variables antes de iniciar.

services:

  # ── Aplicación principal ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: mp_alertas_app
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # Sobreescribir DATABASE_URL según el profile activo
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/mercadopublico.db}
      TZ: America/Santiago

    ports:
      - "${PORT:-5000}:5000"

    volumes:
      # Persistir la BD SQLite y los logs fuera del contenedor
      - mp_data:/data
      - mp_logs:/app/logs

    depends_on:
      db:
        condition: service_healthy
        required: false   # No falla si no hay DB externa (perfil SQLite)

    healthcheck:
      test: ["CMD", "curl", "-f", "-u",
             "${DASHBOARD_USER:-admin}:${DASHBOARD_PASS:-admin}",
             "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL (opcional, activar con --profile postgres) ───────────────────
  db:
    image: postgres:16-alpine
    container_name: mp_alertas_db
    restart: unless-stopped
    profiles: ["postgres"]

    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mp_alertas}
      POSTGRES_USER:     ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_pass}

    volumes:
      - pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mp_user} -d ${POSTGRES_DB:-mp_alertas}"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Nginx reverse proxy (opcional, activar con --profile nginx) ─────────────
  nginx:
    image: nginx:alpine
    container_name: mp_alertas_nginx
    restart: unless-stopped
    profiles: ["nginx"]

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro          # Certificados TLS

    depends_on:
      - app

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mp_data:
    driver: local
  mp_logs:
    driver: local
  pg_data:
    driver: local
